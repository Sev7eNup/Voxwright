name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        run: dotnet test tests/WriteSpeech.Tests --verbosity normal

      - name: Publish application
        run: >
          dotnet publish src/WriteSpeech.App/WriteSpeech.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          /p:Version=${{ steps.version.outputs.version }}
          /p:PublishSingleFile=false
          /p:PublishTrimmed=false
          /p:DebugType=none
          /p:DebugSymbols=false

      - name: Verify no API keys in published config
        shell: bash
        run: |
          API_KEY=$(python3 -c "
          import json
          with open('publish/appsettings.json') as f:
              data = json.load(f)
          key = data.get('WriteSpeech', {}).get('OpenAI', {}).get('ApiKey', '')
          print(key)
          ")
          if [ -n "$API_KEY" ] && [ "$API_KEY" != "null" ]; then
            echo "::error::appsettings.json contains a non-empty API key!"
            exit 1
          fi

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: cmd
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: >
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\WriteSpeech.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WriteSpeech ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            output/WriteSpeech-Setup-${{ steps.version.outputs.version }}.exe
